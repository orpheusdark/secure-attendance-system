version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: secure_attendance
      POSTGRES_USER: secure_attendance
      POSTGRES_PASSWORD: secure_attendance
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://secure_attendance:secure_attendance@postgres:5432/secure_attendance
      REDIS_URL: redis://redis:6379
      TOKEN_SECRET: change-me
      REFRESH_SECRET: change-me-too
      SESSION_TOKEN_SECRET: session-secret
    depends_on:
      - postgres
      - redis
    ports:
      - '4000:4000'

volumes:
  postgres_data:
